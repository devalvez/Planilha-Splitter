name: Multi-Platform Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build MacOS App Bundle
        run: |
          pyinstaller --noconfirm --onefile --windowed --argv-emulation --collect-all customtkinter --name "ExcelSplitterPro" main.py

      - name: Compress App for download
        run: |
          cd dist
          zip -r ExcelSplitterPro-MacOS.zip ExcelSplitterPro.app

      - name: Upload MacOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelSplitterPro-MacOS
          path: dist/ExcelSplitterPro-MacOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --name "ExcelSplitterPro" main.py

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: ExcelSplitterPro-Windows
          path: dist/ExcelSplitterPro.exe

  create-release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded artifacts
        run: ls -R artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            artifacts/ExcelSplitterPro-MacOS/ExcelSplitterPro-MacOS.zip
            artifacts/ExcelSplitterPro-Windows/ExcelSplitterPro.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
